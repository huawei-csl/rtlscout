name: pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with the public spire-hdl submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # The integration tests (tests/test_integration.py) are gated on Yosys + Verilator
      # (see tests/conftest.py); without them they skip. Install the stock apt builds so the
      # tests actually run. tech_eval is vendored under deps/tech_eval; spire-hdl is the submodule.
      - name: Install EDA tools (Yosys + Verilator)
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys verilator

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e deps/spire-hdl
          pip install -e deps/tech_eval
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q tests/
